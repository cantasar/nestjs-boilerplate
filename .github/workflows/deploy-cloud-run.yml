# Google Cloud Run deployment
# Trigger: Manual (workflow_dispatch) or main push
# paths-ignore: deploy skipped for .md, config, docs changes
# For manual only: remove push block
# Required secrets: GCP_PROJECT_ID, GCP_SA_KEY

name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - '**.md'
  #     - '.editorconfig'
  #     - '.prettierrc'
  #     - '.lintstagedrc.json'
  #     - 'docs/**'
  #     - '*.md'

env:
  REGION: europe-west1
  SERVICE_NAME: nestjs-api
  ARTIFACT_REPO: cloud-run

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.ARTIFACT_REPO }}/api:${GITHUB_SHA::7}
          docker build -t ${IMAGE} .
          docker push ${IMAGE}
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated
